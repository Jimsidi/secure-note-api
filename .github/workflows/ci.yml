name: 🔧 CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🧪 Run unit tests
        run: pytest tests/ -v

      - name: 🔍 SAST - Bandit
        run: |
          mkdir -p reports
          bandit -r app/ -c .bandit -f json -o reports/bandit-report.json || true

      - name: 🔎 SAST - Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/python
        continue-on-error: true

      - name: 🔑 Secret Scan - Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 SCA - pip-audit
        run: |
          pip-audit -r requirements.txt -f json -o reports/pip-audit-report.json || true
          pip-audit -r requirements.txt

      - name: 🐳 Build Docker image
        run: docker build -t secure-note-api:${{ github.sha }} .

      - name: 🔬 Container Scan - Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-note-api:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          output: reports/trivy-report.txt

      - name: 🚀 Start API for DAST
        run: |
          docker run -d \
            --name api-for-zap \
            -p 8000:8000 \
            secure-note-api:${{ github.sha }}
          echo "Waiting for API to be ready..."
          sleep 5
          curl -f http://localhost:8000/health

      - name: 🕷️ DAST - OWASP ZAP
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: http://localhost:8000/openapi.json
          format: openapi
          fail_action: false
          cmd_options: '-J reports/zap-report.json'

      - name: 🛑 Stop API container
        if: always()
        run: docker stop api-for-zap && docker rm api-for-zap

      - name: 📤 Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/